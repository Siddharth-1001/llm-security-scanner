id: LLM06-002
name: secret-in-system-prompt
category: LLM06
severity: critical
cwe: CWE-312
languages:
  - python
description: >
  API keys, tokens, secrets, or credentials are embedded in LLM system prompts.
  System prompts are visible to the LLM provider and may be leaked via prompt
  injection attacks or verbose error messages. Never embed secrets in prompts.
remediation: >
  Remove all secrets from LLM prompts. If the LLM needs to access a service,
  implement that access in your application code, not by putting credentials
  in the prompt. Use environment variables and secret management services.
references:
  - https://owasp.org/www-project-top-10-for-llm-applications/
tags:
  - sensitive-info
  - secrets
  - credentials
patterns:
  - type: argument_tainted
    functions:
      - ChatCompletion.create
      - chat.completions.create
      - client.chat.completions.create
      - messages.create
    tainted_sources:
      - api_key
      - secret
      - secret_key
      - token
      - access_token
      - password
      - private_key
      - credentials
      - auth_token
